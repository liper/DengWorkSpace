<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全景业务流程图 · 医疗数据处理平台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB',
                   'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      color: #262626;
      background: #f0f2f5;
    }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }

    /* ─── App Shell ─────────────────────────────────── */
    #app { height: 100vh; display: flex; flex-direction: column; }

    /* ─── Header ────────────────────────────────────── */
    .header {
      height: 60px;
      background: #001529;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 200;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #1677ff, #36cfc9);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-divider {
      width: 1px; height: 24px; background: rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .header-subtitle {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary {
      background: #1677ff;
      color: #fff;
    }
    .btn-primary:hover { background: #4096ff; }
    .btn-default {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-default:hover { background: rgba(255,255,255,0.2); }
    .btn-link { text-decoration: none; }

    /* ─── Toolbar ───────────────────────────────────── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
    }
    .toolbar-label {
      font-size: 12px;
      color: #8c8c8c;
      font-weight: 500;
    }
    .phase-tabs {
      display: flex;
      gap: 6px;
    }
    .phase-tab {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .2s;
      background: #f5f5f5;
      color: #595959;
    }
    .phase-tab.active {
      background: #e6f4ff;
      border-color: #1677ff;
      color: #1677ff;
    }
    .phase-tab:hover:not(.active) { background: #ebebeb; }
    .toolbar-sep { width: 1px; height: 20px; background: #e8e8e8; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #595959; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ─── Main Layout ───────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Canvas Area ───────────────────────────────── */
    .canvas-wrap {
      flex: 1;
      overflow: auto;
      padding: 32px 24px;
      position: relative;
    }
    .canvas {
      min-width: 1200px;
      position: relative;
    }

    /* ─── Phase Banner ──────────────────────────────── */
    .phase-section {
      margin-bottom: 48px;
    }
    .phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .phase-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .phase-title {
      font-size: 16px;
      font-weight: 700;
      color: #262626;
    }
    .phase-desc {
      font-size: 12px;
      color: #8c8c8c;
      margin-left: auto;
    }
    .phase-line {
      flex: 1;
      height: 2px;
      border-radius: 2px;
      opacity: 0.3;
    }

    /* ─── Flow Row ──────────────────────────────────── */
    .flow-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
      position: relative;
    }

    /* ─── Step Card ─────────────────────────────────── */
    .step-wrap {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .step-card {
      width: 160px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 12px;
      padding: 16px 14px 14px;
      cursor: pointer;
      transition: all .25s;
      border: 2px solid transparent;
      position: relative;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .step-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .step-card.active {
      border-color: currentColor;
      box-shadow: 0 0 0 3px rgba(22,119,255,0.15), 0 8px 24px rgba(0,0,0,0.12);
    }
    .step-card.done .step-status {
      display: flex;
    }
    .step-icon-wrap {
      width: 52px; height: 52px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 10px;
    }
    .step-img-wrap {
      width: 52px; height: 52px;
      border-radius: 12px;
      overflow: hidden;
      margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .step-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .step-name {
      font-size: 13px;
      font-weight: 600;
      color: #262626;
      line-height: 1.4;
      margin-bottom: 5px;
    }
    .step-sub {
      font-size: 11px;
      color: #8c8c8c;
      line-height: 1.4;
    }
    .step-status {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      background: #52c41a;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      font-size: 10px;
      color: #fff;
      border: 2px solid #fff;
    }
    .step-badge-num {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1.5px solid #d9d9d9;
      border-radius: 8px;
      padding: 1px 7px;
      font-size: 10px;
      color: #8c8c8c;
      white-space: nowrap;
    }

    /* ─── Arrow Connector ───────────────────────────── */
    .arrow {
      width: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding-top: 26px;
    }
    .arrow-line {
      width: 100%;
      height: 2px;
      position: relative;
    }
    .arrow-line::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-width: 10px;
    }
    .arrow-label {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #8c8c8c;
      white-space: nowrap;
      background: #f0f2f5;
      padding: 0 4px;
      border-radius: 3px;
    }

    /* ─── Decision Diamond ──────────────────────────── */
    .decision-wrap {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .decision-card {
      width: 120px; height: 80px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: all .25s;
    }
    .decision-shape {
      width: 100%; height: 100%;
      position: absolute;
      top: 0; left: 0;
      transform: rotate(0deg);
    }
    .decision-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .decision-text {
      font-size: 11px;
      font-weight: 600;
      color: #262626;
      line-height: 1.3;
    }

    /* ─── Swimlane ──────────────────────────────────── */
    .swimlane-row {
      display: flex;
      align-items: stretch;
      margin-bottom: 24px;
      gap: 16px;
    }
    .swimlane-label {
      width: 80px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 8px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 12px;
      font-weight: 600;
      color: #595959;
      border-left: 4px solid;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .swimlane-content {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.5);
      border-radius: 8px;
      padding: 20px 20px;
      border: 1px dashed #e8e8e8;
    }

    /* ─── Side Panel ────────────────────────────────── */
    .side-panel {
      width: 320px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .3s;
    }
    .side-panel.collapsed { width: 0; }
    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-title { font-size: 15px; font-weight: 700; color: #262626; }
    .panel-close {
      margin-left: auto;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      cursor: pointer;
      color: #8c8c8c;
    }
    .panel-close:hover { background: #e8e8e8; color: #262626; }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .info-section { margin-bottom: 20px; }
    .info-section-title {
      font-size: 12px;
      font-weight: 600;
      color: #8c8c8c;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }
    .info-icon-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .info-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .info-name { font-size: 15px; font-weight: 700; color: #262626; }
    .info-type { font-size: 12px; color: #8c8c8c; margin-top: 2px; }

    .info-desc {
      font-size: 13px;
      color: #595959;
      line-height: 1.7;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
    }

    .ops-list { display: flex; flex-direction: column; gap: 8px; }
    .op-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .op-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #1677ff;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .op-text { font-size: 12px; color: #595959; line-height: 1.6; }

    .input-output-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .io-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px;
    }
    .io-label { font-size: 10px; color: #8c8c8c; font-weight: 600; margin-bottom: 5px; }
    .io-items { display: flex; flex-direction: column; gap: 3px; }
    .io-tag {
      font-size: 11px;
      color: #595959;
      padding: 2px 7px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #e8e8e8;
      display: inline-block;
    }

    .config-area {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
    }
    .config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .config-row:last-child { margin-bottom: 0; }
    .config-key { font-size: 12px; color: #8c8c8c; width: 60px; flex-shrink: 0; }
    .config-val { font-size: 12px; color: #262626; font-weight: 500; flex: 1; }
    .config-edit {
      font-size: 11px; color: #1677ff; cursor: pointer;
    }
    .config-edit:hover { text-decoration: underline; }

    /* icon picker */
    .icon-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .icon-option {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1.5px solid #e8e8e8;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all .15s;
      background: #fff;
    }
    .icon-option:hover { border-color: #1677ff; background: #e6f4ff; }
    .icon-option.selected { border-color: #1677ff; background: #e6f4ff; }

    /* color picker */
    .color-picker-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .color-swatch {
      width: 24px; height: 24px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
      border: 2px solid transparent;
    }
    .color-swatch.selected { border-color: #000; transform: scale(1.15); }
    .color-swatch:hover { transform: scale(1.1); }

    /* ─── Animated Pulse ────────────────────────────── */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-ring {
      position: absolute;
      inset: -4px;
      border-radius: inherit;
      animation: pulse-ring 2s infinite;
    }

    /* ─── Flow animate ──────────────────────────────── */
    @keyframes dash-flow {
      to { stroke-dashoffset: -20; }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .phase-section {
      animation: fade-in-up .5s ease both;
    }
    .phase-section:nth-child(1) { animation-delay: 0s; }
    .phase-section:nth-child(2) { animation-delay: .1s; }
    .phase-section:nth-child(3) { animation-delay: .2s; }
    .phase-section:nth-child(4) { animation-delay: .3s; }

    /* ─── Empty Panel Placeholder ───────────────────── */
    .empty-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #bfbfbf;
      gap: 12px;
      padding: 40px 20px;
      text-align: center;
    }
    .empty-panel-icon { font-size: 48px; }
    .empty-panel-text { font-size: 13px; line-height: 1.6; }

    /* ─── Overview mini map ─────────────────────────── */
    .minimap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 180px;
      background: rgba(0,21,41,0.9);
      border-radius: 10px;
      padding: 12px;
      z-index: 300;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .minimap-title {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: .5px;
    }
    .minimap-phases { display: flex; flex-direction: column; gap: 5px; }
    .minimap-phase {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      border-radius: 6px;
      padding: 4px 6px;
      transition: background .2s;
    }
    .minimap-phase:hover { background: rgba(255,255,255,0.1); }
    .minimap-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .minimap-text { font-size: 11px; color: rgba(255,255,255,0.75); }

    /* ─── Vertical down arrow between phases ─────── */
    .phase-connector {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      margin-bottom: 16px;
      position: relative;
    }
    .phase-connector-line {
      width: 2px;
      height: 100%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .phase-connector-arrow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
    }
    .phase-connector-label {
      background: #fff;
      border-radius: 12px;
      padding: 2px 12px;
      font-size: 11px;
      font-weight: 500;
      position: relative;
      z-index: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* scrollbar */
    .canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    .canvas-wrap::-webkit-scrollbar-track { background: transparent; }
    .canvas-wrap::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: #e8e8e8; border-radius: 2px; }

    /* tag chips */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .chip-blue { background: #e6f4ff; color: #1677ff; }
    .chip-green { background: #f6ffed; color: #52c41a; }
    .chip-orange { background: #fff7e6; color: #fa8c16; }
    .chip-red { background: #fff2f0; color: #ff4d4f; }

    /* Responsive tweak */
    @media (max-width: 900px) {
      .side-panel { width: 0; }
      .minimap { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <span>医疗数据处理平台</span>
    </div>
    <div class="header-divider"></div>
    <span class="header-subtitle">全景业务流程图</span>
    <div class="header-actions">
      <button class="btn btn-default" @click="togglePanel">
        {{ panelOpen ? '收起详情' : '展开详情' }}
      </button>
      <button class="btn btn-default" @click="resetDemo">重置演示</button>
      <button class="btn btn-primary" @click="runDemo">▶ 演示流程</button>
      <a href="index.html" class="btn btn-default btn-link">返回算子广场</a>
    </div>
  </header>

  <!-- ═══════════════════ TOOLBAR ══════════════════ -->
  <div class="toolbar">
    <span class="toolbar-label">视图筛选：</span>
    <div class="phase-tabs">
      <span
        v-for="tab in phaseTabs"
        :key="tab.id"
        class="phase-tab"
        :class="{ active: activePhaseFilter === tab.id }"
        @click="activePhaseFilter = tab.id"
      >{{ tab.label }}</span>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-right">
      <div class="legend-item">
        <div class="legend-dot" style="background:#52c41a"></div>
        <span>已完成</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1677ff"></div>
        <span>进行中</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#d9d9d9"></div>
        <span>待处理</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ff4d4f"></div>
        <span>异常</span>
      </div>
      <div class="toolbar-sep"></div>
      <span class="toolbar-label">共 {{ totalSteps }} 个节点</span>
    </div>
  </div>

  <!-- ═══════════════════ MAIN ══════════════════════ -->
  <div class="main">

    <!-- Canvas -->
    <div class="canvas-wrap" ref="canvasRef">
      <div class="canvas">

        <!-- iterate phases -->
        <template v-for="(phase, pi) in visiblePhases" :key="phase.id">
          <div :id="'phase-'+phase.id" class="phase-section">

            <!-- Phase header -->
            <div class="phase-header">
              <div class="phase-badge" :style="{ background: phase.color }">{{ pi + 1 }}</div>
              <span class="phase-title">{{ phase.name }}</span>
              <div class="phase-line" :style="{ background: phase.color }"></div>
              <span class="phase-desc">{{ phase.desc }}</span>
            </div>

            <!-- Swimlanes or flat row -->
            <template v-if="phase.swimlanes">
              <div v-for="lane in phase.swimlanes" :key="lane.id" class="swimlane-row">
                <div class="swimlane-label" :style="{ borderLeftColor: phase.color, color: phase.color }">
                  {{ lane.name }}
                </div>
                <div class="swimlane-content">
                  <template v-for="(item, si) in lane.steps" :key="item.id">

            ['测试用例','API Token'],['联调报告','接口文档'],19),
          mkStep('monitor2','🩺','服务监控','调用量&性能跟踪',
            '上线后持续监控API调用量、响应时延、错误率等指标，异常时自动告警并触发运维流程。',
            ['查看监控大盘','配置告警阈值','查看历史调用日志','定期生成服务报告'],
            ['实时调用数据'],['监控大盘','告警通知'],20),
        ],
      },
      {
        id: 'output', name: '结果输出阶段', color: '#13c2c2',
        desc: '生成分析报告并导出结果',
        steps: [
          mkStep('report','📑','报告生成','自定义报告模板',
            '系统根据分析结果自动生成医疗报告，用户可选择报告模板、自定义章节内容，支持图表嵌入和多语言输出。',
            ['进入"报告中心"','选择报告模板（标准/自定义）','配置报告包含的指标和图表','点击"生成报告"，预览效果','确认无误后发布'],
            ['分析结果','报告模板'],['医疗分析报告（PDF/Word）'],21,null),
          mkStep('export','📤','数据导出','多格式导出下载',
            '用户可将处理后的数据集、模型预测结果、统计报告以CSV、Excel、JSON、HL7 FHIR等格式导出，用于下游系统对接。',
            ['进入"数据导出"页面','选择导出内容（数据集/报告/模型结果）','选择导出格式','配置字段映射（可选）','点击"导出"，下载文件'],
            ['分析结果数据','报告'],['导出文件（CSV/Excel/JSON）'],22),
          mkStep('share','🔗','成果共享','团队协作&权限管理',
            '用户可将分析成果（数据集、模型、报告）共享给团队成员或外部合作方，系统支持细粒度权限控制（查看/编辑/下载）。',
            ['进入成果详情页','点击"共享"按钮','添加被共享人员或团队','设置访问权限级别','发送共享邀请链接'],
            ['分析成果','用户列表'],['共享链接','权限记录'],23),
          mkStep('archive','🗃️','归档管理','项目结案归档',
            '项目完成后执行结案归档，系统将项目数据、模型、报告打包存储，设置保留策略，满足医疗数据的合规保存要求（≥10年）。',
            ['确认项目所有任务已完成','点击"提交归档"','填写归档说明和保留期限','管理员审批后自动归档'],
            ['项目全量数据'],['归档包','归档记录'],24),
        ],
      },
    ]);

    const visiblePhases = computed(() => {
      if (activePhaseFilter.value === 'all') return phases.value;
      return phases.value.filter(p => p.id === activePhaseFilter.value);
    });

    const totalSteps = computed(() => {
      let n = 0;
      for (const p of phases.value) {
        if (p.swimlanes) {
          for (const l of p.swimlanes) n += l.steps.length;
        } else {
          n += (p.steps || []).length;
        }
      }
      return n;
    });

    function selectStep(step, phase) {
      selectedStep.value = step;
      selectedPhase.value = phase;
      if (!panelOpen.value) panelOpen.value = true;
    }

    function togglePanel() {
      panelOpen.value = !panelOpen.value;
    }

    function statusLabel(s) {
      return { pending:'待处理', active:'进行中', done:'已完成', error:'异常' }[s] || s;
    }
    function statusChipClass(s) {
      return {
        pending: 'chip',
        active: 'chip chip-blue',
        done: 'chip chip-green',
        error: 'chip chip-red',
      }[s] || 'chip';
    }

    function scrollToPhase(id) {
      const el = document.getElementById('phase-' + id);
      if (el && canvasRef.value) {
        canvasRef.value.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
      }
    }

    let demoTimer = null;
    function resetDemo() {
      clearInterval(demoTimer);
      for (const p of phases.value) {
        const allSteps = p.swimlanes
          ? p.swimlanes.flatMap(l => l.steps)
          : (p.steps || []);
        for (const s of allSteps) {
          if (s.status !== 'pending') s.status = 'pending';
        }
      }
      selectedStep.value = null;
    }

    function runDemo() {
      resetDemo();
      const allSteps = [];
      for (const p of phases.value) {
        const steps = p.swimlanes
          ? p.swimlanes.flatMap(l => l.steps)
          : (p.steps || []);
        for (const s of steps) allSteps.push({ step: s, phase: p });
      }
      let i = 0;
      function next() {
        if (i > 0) allSteps[i - 1].step.status = 'done';
        if (i >= allSteps.length) return;
        const { step, phase } = allSteps[i];
        step.status = 'active';
        selectStep(step, phase);
        i++;
        demoTimer = setTimeout(next, 900);
      }
      next();
    }

    return {
      canvasRef, panelOpen, activePhaseFilter, phases, visiblePhases,
      totalSteps, phaseTabs, selectedStep, selectedPhase,
      iconOptions, colorOptions, statusOptions,
      selectStep, togglePanel, statusLabel, statusChipClass,
      scrollToPhase, resetDemo, runDemo,
    };
  }
}).mount('#app');
</script>
</body>
</html>
