<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医疗应用与插件广场 · 医疗AI平台</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    /* ─── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB',
                   'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      color: #1e2a3a;
      background: #f0f4fb;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input  { font-family: inherit; outline: none; border: none; }
    a { text-decoration: none; }

    /* ─── Header ─────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 200;
      height: 60px;
      background: #ffffff;
      border-bottom: 1px solid #e2eaf7;
      display: flex; align-items: center;
      padding: 0 28px;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(16,40,100,.07);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #1677ff, #36cfc9);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name { font-size: 16px; font-weight: 700; color: #1a2f5a; line-height: 1.2; }
    .logo-sub  { font-size: 11px; color: #8898b0; }
    .logo-sep  { width: 1px; height: 26px; background: rgba(26,47,90,.12); flex-shrink: 0; }
    .header-nav {
      display: flex; gap: 2px;
    }
    .nav-link {
      padding: 6px 13px;
      border-radius: 6px;
      font-size: 13px; font-weight: 500;
      color: #4a5e7a;
      transition: all .15s;
      cursor: pointer;
    }
    .nav-link:hover  { color: #1677ff; background: #eff6ff; }
    .nav-link.active { color: #1677ff; background: #e8f0ff; font-weight: 600; }
    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }
    .hdr-badge {
      font-size: 11px; color: #6b7fa8;
      border: 1px solid #d4e0f5;
      border-radius: 10px; padding: 2px 10px;
    }

    /* ─── Banner ─────────────────────────────────── */
    .page-banner {
      background: linear-gradient(118deg, #eff6ff 0%, #dbeafe 55%, #e0f2fe 100%);
      padding: 36px 28px 30px;
      position: relative; overflow: hidden;
      border-bottom: 1px solid #d4e4f7;
    }
    .page-banner::before {
      content: ''; position: absolute;
      right: -40px; top: -60px;
      width: 380px; height: 380px; border-radius: 50%;
      background: rgba(22,119,255,.07); pointer-events: none;
    }
    .page-banner::after {
      content: ''; position: absolute;
      right: 200px; bottom: -100px;
      width: 280px; height: 280px; border-radius: 50%;
      background: rgba(14,165,233,.06); pointer-events: none;
    }
    .banner-inner {
      max-width: 1240px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
      gap: 24px;
    }
    .banner-left { flex: 1; min-width: 0; }
    .banner-eyebrow {
      font-size: 12px; color: #6b7fa8;
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px;
    }
    .banner-title {
      font-size: 28px; font-weight: 700; color: #0f1c35;
      letter-spacing: .02em; margin-bottom: 10px; line-height: 1.25;
    }
    .banner-desc {
      font-size: 13px; color: #4a5e7a; line-height: 1.75;
      max-width: 540px; margin-bottom: 16px;
    }
    .banner-cats {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .banner-cat {
      background: rgba(22,119,255,.08); border: 1px solid rgba(22,119,255,.2);
      color: #1677ff; border-radius: 14px;
      padding: 3px 12px; font-size: 12px;
    }
    .banner-stats {
      display: flex; gap: 28px; flex-shrink: 0;
    }
    .bstat { text-align: center; }
    .bstat-num {
      font-size: 36px; font-weight: 700; color: #1677ff; line-height: 1;
    }
    .bstat-num sup { font-size: 16px; font-weight: 400; color: #8898b0; }
    .bstat-label { font-size: 12px; color: #6b7fa8; margin-top: 4px; }
    .bstat-sep { width: 1px; background: rgba(26,47,90,.12); align-self: stretch; }

    /* ─── Main Content ───────────────────────────── */
    .main-content {
      max-width: 1240px; margin: 0 auto; padding: 28px 24px 48px;
    }

    /* ─── Section ────────────────────────────────── */
    .mp-section { margin-bottom: 44px; }
    .mp-section-hd {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 18px;
    }
    .mp-section-left { display: flex; align-items: center; gap: 14px; }
    .mp-section-icon {
      width: 44px; height: 44px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .mp-section-icon.apps   { background: #e8f0ff; }
    .mp-section-icon.plugins{ background: #e6f7f5; }
    .mp-section-title  { font-size: 20px; font-weight: 700; color: #0f1c35; }
    .mp-section-sub    { font-size: 13px; color: #6b7fa8; margin-top: 3px; }
    .mp-section-badge  {
      padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-top: 6px;
    }
    .mp-section-badge.apps    { background: #1677ff; color: #fff; }
    .mp-section-badge.plugins { background: #07a691; color: #fff; }

    /* ─── Category Grid ──────────────────────────── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .cat-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #d4e0f5;
      padding: 20px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .cat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(10,47,107,.16);
      border-color: #1677ff;
    }
    .cat-icon-wrap {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .cat-body { flex: 1; min-width: 0; }
    .cat-name { font-size: 16px; font-weight: 700; color: #0f1c35; margin-bottom: 6px; }
    .cat-desc { font-size: 12px; color: #6b7fa8; line-height: 1.65; margin-bottom: 10px; }
    .cat-kws  { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .cat-kw   {
      font-size: 11px; padding: 2px 8px; border-radius: 8px;
      background: #f0f4fb; color: #4a5e7a;
    }
    .cat-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #f0f4fb; padding-top: 10px;
    }
    .cat-counts { display: flex; gap: 16px; }
    .cat-count-item { font-size: 12px; color: #8898b0; }
    .cat-count-item strong { font-size: 16px; font-weight: 700; color: #1677ff; }
    .cat-arrow {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f0f4fb;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #8898b0;
      transition: background .15s, color .15s;
    }
    .cat-card:hover .cat-arrow { background: #1677ff; color: #fff; }

    /* plugin category: subcats chips on card */
    .cat-subcats { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .cat-subcat-chip {
      font-size: 10px; padding: 1px 7px; border-radius: 8px;
      background: #e6f7f5; color: #07a691; border: 1px solid #b2e8df;
    }

    /* ─── Subcategory Bar (detail view) ─────────────── */
    .subcat-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 12px; padding-bottom: 14px;
      border-bottom: 1px solid #eef2fb;
    }
    .subcat-chip {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid #d4e0f5; background: #fff; color: #4a5e7a;
      transition: all .15s; white-space: nowrap; cursor: pointer;
    }
    .subcat-chip:hover { border-color: #07a691; color: #07a691; }
    .subcat-chip.sc-active { background: #07a691; border-color: #07a691; color: #fff; }

    /* ─── Detail View ────────────────────────────── */
    .detail-topbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 8px;
      background: #fff; border: 1px solid #d4e0f5;
      font-size: 13px; color: #4a5e7a;
      transition: border-color .15s, color .15s;
    }
    .back-btn:hover { border-color: #1677ff; color: #1677ff; }
    .breadcrumb { font-size: 13px; color: #8898b0; }
    .bc-link { color: #1677ff; cursor: pointer; }
    .bc-link:hover { text-decoration: underline; }

    .detail-cat-hd {
      background: #fff; border-radius: 12px; border: 1px solid #d4e0f5;
      padding: 20px 24px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 18px;
    }
    .detail-cat-icon {
      width: 60px; height: 60px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; flex-shrink: 0;
    }
    .detail-cat-title { font-size: 20px; font-weight: 700; color: #0f1c35; }
    .detail-cat-desc  { font-size: 13px; color: #6b7fa8; margin-top: 4px; line-height: 1.6; }
    .detail-cat-type  {
      display: inline-block; margin-top: 8px;
      font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px;
    }
    .type-apps    { background: #e8f0ff; color: #1677ff; }
    .type-plugins { background: #e6f7f5; color: #07a691; }

    /* ─── Filter Bar ─────────────────────────────── */
    .filter-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-wrap input {
      width: 100%; height: 38px;
      border: 1px solid #d4e0f5; border-radius: 8px;
      padding: 0 12px 0 36px; font-size: 13px; color: #1e2a3a;
      background: #fff; transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: #1677ff; }
    .search-wrap input::placeholder { color: #b0bece; }
    .search-ico {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%); color: #b0bece; font-size: 14px; pointer-events: none;
    }
    .filter-btns { display: flex; gap: 8px; }
    .filter-btn {
      padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
      border: 1px solid #d4e0f5; background: #fff; color: #4a5e7a;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: #1677ff; color: #1677ff; }
    .filter-btn.active { background: #1677ff; border-color: #1677ff; color: #fff; }
    .filter-btn.active-plugin { background: #07a691; border-color: #07a691; color: #fff; }
    .result-count { margin-left: auto; font-size: 13px; color: #8898b0; }

    /* ─── Items Grid ─────────────────────────────── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .item-card {
      background: #fff; border-radius: 12px; border: 1px solid #d4e0f5;
      padding: 18px; display: flex; flex-direction: column;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .item-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(10,47,107,.14);
      border-color: #91caff;
    }
    .item-top {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px;
    }
    .item-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: #f0f4fb;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .item-meta { flex: 1; min-width: 0; }
    .item-name {
      font-size: 14px; font-weight: 700; color: #0f1c35;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .item-vendor { font-size: 11px; color: #8898b0; margin-bottom: 4px; }
    .item-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .ibadge {
      font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
    }
    .ibadge-new   { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .ibadge-hot   { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
    .ibadge-mcp   { background: #eff6ff; color: #1677ff; border: 1px solid #bfdbfe; }
    .ibadge-skill { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .item-subcat  {
      font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 4px;
      background: #e6f7f5; color: #07a691; border: 1px solid #b2e8df;
    }
    .item-desc {
      font-size: 12px; color: #6b7fa8; line-height: 1.65;
      margin-bottom: 10px; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .item-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .item-tag {
      font-size: 11px; padding: 2px 7px; border-radius: 6px;
      background: #f0f4fb; color: #4a5e7a;
    }
    .item-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 10px; border-top: 1px solid #f0f4fb;
      margin-top: auto;
    }
    .item-stats { display: flex; align-items: center; gap: 8px; }
    .item-rating { font-size: 12px; color: #f59e0b; font-weight: 600; }
    .item-installs { font-size: 11px; color: #8898b0; }
    .item-version  { font-size: 11px; color: #b0bece; }
    .install-btn {
      padding: 5px 14px;
      background: #1677ff; color: #fff;
      border-radius: 6px; font-size: 12px; font-weight: 600;
      transition: background .15s;
    }
    .install-btn:hover { background: #0958d9; }
    .install-btn.plugin-btn { background: #07a691; }
    .install-btn.plugin-btn:hover { background: #057a6b; }

    /* ─── Empty State ────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      color: #8898b0;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: .5; }
    .empty-state p { font-size: 14px; }

    /* ─── Responsive ─────────────────────────────── */
    @media (max-width: 1100px) {
      .items-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 860px) {
      .cat-grid   { grid-template-columns: repeat(2, 1fr); }
      .items-grid { grid-template-columns: repeat(2, 1fr); }
      .banner-stats { display: none; }
    }
    @media (max-width: 560px) {
      .cat-grid, .items-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ HEADER ══════════════════════════════════════ -->
  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">🏥</div>
      <div class="logo-text">
        <div class="logo-name">医疗AI平台</div>
        <div class="logo-sub">Healthcare Intelligence Platform</div>
      </div>
    </a>
    <div class="logo-sep"></div>
    <nav class="header-nav">
      <a class="nav-link" href="index.html">算子广场</a>
      <span class="nav-link active">应用&amp;插件广场</span>
      <a class="nav-link" href="medical-eval-report.html">测评报告</a>
      <a class="nav-link" href="medical-maas-proposal.html">MaaS能力</a>
    </nav>
    <div class="header-right">
      <span class="hdr-badge">v2.0.0</span>
    </div>
  </header>

  <!-- ══ BANNER ══════════════════════════════════════ -->
  <div class="page-banner">
    <div class="banner-inner">
      <div class="banner-left">
        <div class="banner-eyebrow">Healthcare AI · Application &amp; Plugin Marketplace</div>
        <div class="banner-title">医疗应用与插件广场</div>
        <div class="banner-desc">
          覆盖医疗行业六大核心场景，汇聚 AI 原生应用与标准化插件（MCP / Skill），
          助力医院、科研机构与医药企业快速构建智能医疗能力体系。
        </div>
        <div class="banner-cats">
          <span v-for="cat in categories" :key="cat.id" class="banner-cat">{{ cat.name }}</span>
        </div>
      </div>
      <div class="banner-stats">
        <div class="bstat">
          <div class="bstat-num">{{ totalApps }}<sup>+</sup></div>
          <div class="bstat-label">AI 应用</div>
        </div>
        <div class="bstat-sep"></div>
        <div class="bstat">
          <div class="bstat-num">{{ totalPlugins }}<sup>+</sup></div>
          <div class="bstat-label">插件工具</div>
        </div>
        <div class="bstat-sep"></div>
        <div class="bstat">
          <div class="bstat-num">10</div>
          <div class="bstat-label">插件分类</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ MAIN CONTENT ════════════════════════════════ -->
  <div class="main-content">

    <!-- ── OVERVIEW MODE ──────────────────────────── -->
    <template v-if="!view.category">

      <!-- 应用广场 section -->
      <div class="mp-section">
        <div class="mp-section-hd">
          <div class="mp-section-left">
            <div class="mp-section-icon apps">📱</div>
            <div>
              <div class="mp-section-title">应用广场</div>
              <div class="mp-section-sub">开箱即用的医疗 AI 原生应用，覆盖临床、管理、科研全链条</div>
            </div>
          </div>
          <div class="mp-section-badge apps">共 {{ totalApps }} 个应用</div>
        </div>
        <div class="cat-grid">
          <div
            v-for="cat in categories"
            :key="'app-' + cat.id"
            class="cat-card"
            @click="enterCategory(cat, 'apps')"
          >
            <div class="cat-icon-wrap" :style="{ background: cat.lightBg }">{{ cat.icon }}</div>
            <div class="cat-body">
              <div class="cat-name">{{ cat.name }}</div>
              <div class="cat-desc">{{ cat.desc }}</div>
              <div class="cat-kws">
                <span v-for="kw in cat.keywords" :key="kw" class="cat-kw">{{ kw }}</span>
              </div>
              <div class="cat-footer">
                <div class="cat-counts">
                  <div class="cat-count-item"><strong>{{ cat.appCount }}</strong> 个应用</div>
                </div>
                <div class="cat-arrow">›</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 插件广场 section -->
      <div class="mp-section">
        <div class="mp-section-hd">
          <div class="mp-section-left">
            <div class="mp-section-icon plugins">🔌</div>
            <div>
              <div class="mp-section-title">插件广场 <span style="font-size:13px;font-weight:400;color:#8898b0;">MCP + Skills</span></div>
              <div class="mp-section-sub">标准化 MCP 协议工具与 AI Skills，覆盖医疗、生物信息、数据科学全领域</div>
            </div>
          </div>
          <div class="mp-section-badge plugins">共 {{ totalPlugins }} 个插件</div>
        </div>
        <div class="cat-grid">
          <div
            v-for="pcat in pluginCategories"
            :key="'plugin-' + pcat.id"
            class="cat-card"
            @click="enterCategory(pcat, 'plugins')"
          >
            <div class="cat-icon-wrap" :style="{ background: pcat.lightBg }">{{ pcat.icon }}</div>
            <div class="cat-body">
              <div class="cat-name">{{ pcat.name }}</div>
              <div class="cat-desc">{{ pcat.desc }}</div>
              <div class="cat-subcats">
                <span v-for="sc in pcat.subcats.slice(0,3)" :key="sc" class="cat-subcat-chip">{{ sc }}</span>
                <span v-if="pcat.subcats.length > 3" class="cat-subcat-chip">+{{ pcat.subcats.length - 3 }}</span>
              </div>
              <div class="cat-footer">
                <div class="cat-counts">
                  <div class="cat-count-item"><strong>{{ pcat.pluginCount }}</strong> 个插件</div>
                  <div class="cat-count-item">{{ pcat.subcats.length }} 个子类</div>
                </div>
                <div class="cat-arrow">›</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </template>

    <!-- ── DETAIL MODE ────────────────────────────── -->
    <template v-else>
      <!-- Topbar -->
      <div class="detail-topbar">
        <button class="back-btn" @click="goBack">← 返回广场</button>
        <div class="breadcrumb">

    /* ── Computed ── */
    const totalApps    = computed(() => categories.reduce((s, c) => s + c.appCount, 0));
    const totalPlugins = computed(() => pluginCategories.reduce((s, c) => s + c.pluginCount, 0));

    const filteredItems = computed(() => {
      if (!view.value.category) return [];
      if (view.value.type === 'apps') {
        let items = appsData[view.value.category.id] || [];
        if (search.value.trim()) {
          const q = search.value.trim().toLowerCase();
          items = items.filter(i =>
            i.name.toLowerCase().includes(q) ||
            i.desc.toLowerCase().includes(q) ||
            i.tags.some(t => t.toLowerCase().includes(q))
          );
        }
        return items;
      } else {
        let items = pluginsData[view.value.category.id] || [];
        if (activeSubcat.value && activeSubcat.value !== '全部') {
          items = items.filter(i => i.subcat === activeSubcat.value);
        }
        if (activeFilter.value !== 'all') {
          items = items.filter(i => i.type === activeFilter.value);
        }
        if (search.value.trim()) {
          const q = search.value.trim().toLowerCase();
          items = items.filter(i =>
            i.name.toLowerCase().includes(q) ||
            i.desc.toLowerCase().includes(q) ||
            i.tags.some(t => t.toLowerCase().includes(q)) ||
            (i.subcat && i.subcat.toLowerCase().includes(q))
          );
        }
        return items;
      }
    });

    /* ── Actions ── */
    function enterCategory(cat, type) {
      view.value = { category: cat, type };
      search.value = '';
      activeFilter.value = 'all';
      activeSubcat.value = '全部';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function goBack() {
      view.value = { category: null, type: null };
    }

    return {
      view, search, activeFilter, activeSubcat, pluginFilters,
      categories, pluginCategories, filteredItems,
      totalApps, totalPlugins,
      enterCategory, goBack,
    };
  }
